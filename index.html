  {id:"amor",emoji:"💌",label:"Amor y Relación",desc:"Cómo ama y qué la hace sentir especial",questions:["¿Cómo sabes que alguien realmente te quiere?","¿Qué detalle romántico te parece el más especial?","¿Prefieres que te sorprendan o planear las cosas juntos?","¿Cuál es tu recuerdo favorito de algo que alguien haya hecho por ti?","¿Cómo te gusta que te demuestren cariño?","¿Qué es lo que más valoras en una pareja?"]},
  {id:"suenos",emoji:"🌙",label:"Sueños y Futuro",desc:"Sus metas, viajes y lo que sueña",questions:["¿A qué lugar del mundo te encantaría viajar?","¿Tienes algún sueño o meta que quieras cumplir?","¿Qué es algo que nunca has hecho pero te mueres por intentar?","¿Cómo te imaginas tu vida ideal en 5 años?","¿Hay algo que quieras aprender o estudiar?","¿Tienes algún lugar donde siempre quisiste vivir?","¿Qué es lo que más valoras en tu vida ahora mismo?"]},
  {id:"notas",emoji:"📝",label:"Notas Libres",desc:"Cosas que diga sin ser de una pregunta específica",questions:["Algo que dijo hoy y quiero recordar...","Una cosa que le gusta que descubrí sin preguntarle...","Algo gracioso o especial que pasó entre nosotros...","Una comida, lugar o cosa que mencionó que le gusta...","Algo que le incomoda o no le gusta y lo noté...","Una meta o sueño que mencionó de pasada...","Nota libre #1","Nota libre #2","Nota libre #3"]},
  {id:"resumen",emoji:"💗",label:"Ver Perfil",desc:"",questions:[]}
];

var TOTAL_Q = CATS.filter(function(c){return c.id!=='resumen';}).reduce(function(s,c){return s+c.questions.length;},0);
var current = CATS[0].id;

// ═══════════════════════════════════════
// GUARDAR
// ═══════════════════════════════════════
function saveLocal(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }catch(e){}
}

function saveFirebase(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function(){
    docRef.set(data)
      .then(function(){
        setSyncDot('✅ Guardado en nube', true);
      })
      .catch(function(){
        setSyncDot('💾 Solo local', false);
      });
  }, 1000);
}

function saveAll(){
  saveLocal();
  saveFirebase();
}

function setSyncDot(msg, ok){
  var el = document.getElementById('syncDot');
  if(el){ el.textContent = msg; el.style.color = ok ? '#d4607a' : '#9c717e'; }
}

// ═══════════════════════════════════════
// INICIAR APP
// ═══════════════════════════════════════
function startApp(){
  spawnPetals();
  showAnniversary();
  updateProgress();
  renderTabs();
  renderCards();
  connectFirebase();
}

function connectFirebase(){
  setSyncDot('☁️ Conectando...', false);
  docRef.get()
    .then(function(snap){
      fbOk = true;
      if(snap.exists){
        var fbData = snap.data();
        // Fusionar: si Firebase tiene datos, usarlos
        Object.keys(fbData).forEach(function(k){ data[k] = fbData[k]; });
        saveLocal();
        updateProgress();
        renderTabs();
        renderCards();
        setSyncDot('☁️ Conectado', true);
      } else {
        // Primera vez: subir datos locales a Firebase
        docRef.set(data).then(function(){
          setSyncDot('☁️ Conectado', true);
        });
      }
    })
    .catch(function(err){
      console.warn('Firebase:', err);
      setSyncDot('💾 Sin nube (local)', false);
    });
}

// Si ya tenía sesión, iniciar app
if(checkSession()) startApp();

// ═══════════════════════════════════════
// PÉTALOS
// ═══════════════════════════════════════
function spawnPetals(){
  var c = document.getElementById('petals');
  var emojis = ['🌸','🌺','🌷','💮','🌼'];
  for(var i=0;i<18;i++){
    var el = document.createElement('span');
    el.className='petal';
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left=Math.random()*100+'vw';
    el.style.top=Math.random()*100+'vh';
    var dur=14+Math.random()*20;
    el.style.animationDuration=dur+'s';
    el.style.animationDelay=-Math.random()*dur+'s';
    el.style.fontSize=(.7+Math.random()*.7)+'rem';
    c.appendChild(el);
  }
}

// ═══════════════════════════════════════
// ANIVERSARIO
// ═══════════════════════════════════════
function showAnniversary(){
  var today=new Date(), totalDays=Math.floor((today-ANIV_START)/(1000*60*60*24));
  var years=Math.floor(totalDays/365), months=Math.floor((totalDays%365)/30);
  var day=today.getDate();
  var nextThirty=day<30?new Date(today.getFullYear(),today.getMonth(),30):new Date(today.getFullYear(),today.getMonth()+1,30);
  var daysUntil=Math.ceil((nextThirty-today)/(1000*60*60*24));
  var isToday=day===30;
  var badge=document.getElementById('anniversaryBadge');
  if(!badge) return;
  badge.innerHTML='<div class="aniv-badge'+(isToday?' aniv-today':'')+'"><div class="aniv-left"><span class="aniv-icon">'+(isToday?'🎉':'💑')+'</span><div><div class="aniv-title">'+(isToday?'¡Feliz Aniversario! 🎊':'Aniversario')+'</div><div class="aniv-date">30 de julio del 2016 · '+years+' años y '+months+' mes'+(months!==1?'es':'')+'</div></div></div><div class="aniv-right"><div class="aniv-count">'+(isToday?'🥂':daysUntil)+'</div><div class="aniv-count-lbl">'+(isToday?'¡Hoy!':'días para el día 30')+'</div></div></div>';
}

// ═══════════════════════════════════════
// PROGRESO
// ═══════════════════════════════════════
function countAnswered(){
  var n=0;
  CATS.forEach(function(cat){
    if(cat.id==='resumen') return;
    cat.questions.forEach(function(_,i){ if((data[cat.id+'_'+i]||'').trim()) n++; });
  });
  return n;
}
function countCatAnswered(cat){
  return cat.questions.filter(function(_,i){return (data[cat.id+'_'+i]||'').trim();}).length;
}
function updateProgress(){
  var n=countAnswered(), pct=Math.round(n/TOTAL_Q*100);
  document.getElementById('progressText').textContent=n+' de '+TOTAL_Q+' respuestas guardadas';
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('progressBar').style.width=pct+'%';
}

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
function renderTabs(){
  var c=document.getElementById('tabsContainer'); c.innerHTML='';
  CATS.forEach(function(cat){
    var btn=document.createElement('button');
    btn.className='tab'+(cat.id===current?' active':'');
    var ans=cat.id==='resumen'?countAnswered():countCatAnswered(cat);
    var tot=cat.id==='resumen'?TOTAL_Q:cat.questions.length;
    btn.innerHTML=cat.emoji+' '+cat.label+' <span class="tab-count">'+ans+'/'+tot+'</span>';
    btn.onclick=function(){ current=cat.id; renderTabs(); renderCards(); window.scrollTo({top:0,behavior:'smooth'}); };
    c.appendChild(btn);
  });
}

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
var toastTimer;
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ t.classList.remove('show'); },2400);
}

// ═══════════════════════════════════════
// CARDS
// ═══════════════════════════════════════
function renderCards(){
  var c=document.getElementById('cardsContainer'); c.innerHTML='';
  if(current==='resumen'){ renderSummary(c); return; }
  var cat=CATS.find(function(x){return x.id===current;});
  var hdr=document.createElement('div'); hdr.className='cat-header';
  hdr.innerHTML='<div class="cat-emoji">'+cat.emoji+'</div><div><div class="cat-title">'+cat.label+'</div><div class="cat-desc">'+cat.desc+'</div></div>';
  c.appendChild(hdr);
  cat.questions.forEach(function(q,i){
    var key=cat.id+'_'+i, dateKey=key+'_date';
    var val=data[key]||'', has=val.trim().length>0;
    var isNotes=cat.id==='notas';
    var card=document.createElement('div');
    card.className=(isNotes?'q-card notes-card':'q-card')+(has?' answered':'');
    card.style.animationDelay=(i*.04)+'s';
    card.innerHTML='<div class="q-num">'+(isNotes?'📝 Nota libre':'Pregunta '+(i+1))+'</div>'+
      '<div class="q-text">'+q+'</div>'+
      '<div class="answer-wrap"><textarea class="answer-area" placeholder="Escribe la respuesta de Anny aquí..." rows="2">'+val+'</textarea><span class="check-icon">✅</span></div>'+
      (has&&data[dateKey]?'<span class="date-badge">Guardado: '+data[dateKey]+'</span>':'');
    var ta=card.querySelector('textarea');
    (function(k,dk,cd){
      ta.addEventListener('input',function(){
        data[k]=ta.value;
        var filled=ta.value.trim().length>0;
        if(filled&&!data[dk]) data[dk]=new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'});
        if(!filled) delete data[dk];
        saveAll();
        cd.classList.toggle('answered',filled);
        updateProgress(); renderTabs();
      });
      ta.addEventListener('blur',function(){ if(ta.value.trim()) showToast('💕 Respuesta de Anny guardada'); });
    })(key,dateKey,card);
    c.appendChild(card);
  });
  var btn=document.createElement('button'); btn.className='save-btn';
  btn.innerHTML='💾 &nbsp;Guardar todo';
  btn.onclick=function(){ saveAll(); showToast('✅ Todo guardado correctamente 💕'); };
  c.appendChild(btn);
}

// ═══════════════════════════════════════
// PERFIL
// ═══════════════════════════════════════
function renderSummary(c){
  var total=countAnswered();
  var catsAns=CATS.filter(function(x){return x.id!=='resumen'&&countCatAnswered(x)>0;}).length;
  var hero=document.createElement('div'); hero.className='profile-hero';
  hero.innerHTML='<div class="profile-avatar">🌸</div><div class="profile-name">'+NAME+'</div>'+
    '<div class="profile-since">Juntos desde el 30 de julio del 2016 💕</div>'+
    '<div class="profile-stats"><div class="stat"><div class="stat-num">'+total+'</div><div class="stat-lbl">Respuestas</div></div>'+
    '<div class="stat"><div class="stat-num">'+catsAns+'</div><div class="stat-lbl">Categorías</div></div>'+
    '<div class="stat"><div class="stat-num">'+Math.round(total/TOTAL_Q*100)+'%</div><div class="stat-lbl">Completado</div></div></div>';
  c.appendChild(hero);
  if(total===0){
    var e=document.createElement('div'); e.className='empty-state';
    e.innerHTML='<div class="empty-icon">🌷</div><p>Aún no hay respuestas guardadas.<br>¡Empieza a conocer a Anny poco a poco! 💕</p>';
    c.appendChild(e);
  } else {
    CATS.forEach(function(cat){
      if(cat.id==='resumen') return;
      var ans=cat.questions.map(function(q,i){return{q:q,a:data[cat.id+'_'+i]||'',d:data[cat.id+'_'+i+'_date']||''};}).filter(function(x){return x.a.trim();});
      if(!ans.length) return;
      var sec=document.createElement('div'); sec.className='summary-section';
      sec.innerHTML='<h3>'+cat.emoji+' '+cat.label+'</h3>';
      ans.forEach(function(x){
        var item=document.createElement('div'); item.className='summary-item';
        item.innerHTML='<div class="summary-q">'+x.q+(x.d?' <span style="color:#c4a4ae;font-style:italic">· '+x.d+'</span>':'')+'</div><div class="summary-a">'+x.a+'</div>';
        sec.appendChild(item);
      });
      c.appendChild(sec);
    });
  }
  var expBtn=document.createElement('button'); expBtn.className='export-btn';
  expBtn.innerHTML='📄 &nbsp;Exportar como texto'; expBtn.onclick=exportTxt;
  c.appendChild(expBtn);
}

// ═══════════════════════════════════════
// EXPORTAR
// ═══════════════════════════════════════
function exportTxt(){
  var txt='💕 PERFIL COMPLETO DE '+NAME.toUpperCase()+' 💕\n'+'═'.repeat(44)+'\n\n';
  CATS.forEach(function(cat){
    if(cat.id==='resumen') return;
    var ans=cat.questions.map(function(q,i){return{q:q,a:data[cat.id+'_'+i]||'',d:data[cat.id+'_'+i+'_date']||''};}).filter(function(x){return x.a.trim();});
    if(!ans.length) return;
    txt+=cat.emoji+'  '+cat.label.toUpperCase()+'\n'+'─'.repeat(32)+'\n';
    ans.forEach(function(x){ txt+='• '+x.q+'\n  → '+x.a+(x.d?' ('+x.d+')':'')+'\n\n'; });
  });
  txt+='\nGenerado el '+new Date().toLocaleDateString('es-PE',{weekday:'long',year:'numeric',month:'long',day:'numeric'})+' 💕';
  var blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='perfil-anny-lucero-flores-valle.txt'; a.click();
  URL.revokeObjectURL(url);
  showToast('📄 Archivo descargado 💕');
}
</script>
